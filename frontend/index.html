<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whispr</title>
  <link rel="icon" type="image/x-icon" href="/favicon_io/favicon.ico" />
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen active">
      <div class="auth-container">
        <div class="auth-header">
          <div class="logo"><img class="image" src="5dd19ba4123bd610e51c0f78c194965e-removebg-preview.png" alt="img"><h3 style="padding-top: 1rem;">hispr</h3></div>
        </div>
        <form id="auth-form" class="auth-form">
          <div id="auth-tabs" class="auth-tabs">
            <button type="button" class="tab active" data-tab="login">Login</button>
            <button type="button" class="tab" data-tab="register">Register</button>
          </div>
          <div id="auth-fields">
            <input type="email" id="auth-email" placeholder="Email" required>
            <input type="password" id="auth-password" placeholder="Password" required>
            <input type="text" id="auth-username" placeholder="Username" class="hidden">
          </div>
          <button type="button" id="forgot-password-link" class="link-button">Forgot password?</button>
          <button type="submit" class="btn btn-primary btn-block" id="auth-submit">Login</button>
          <p id="auth-error" class="auth-error hidden"></p>
        </form>
      </div>
    </div>

    <!-- Main Chat Screen -->
    <div id="main-screen" class="screen">
      <aside class="sidebar">
        <header class="sidebar-header">
          <div class="user-avatar" id="sidebar-avatar">
            <img src="" alt="Avatar" onerror="this.style.display='none'; this.nextElementSibling.textContent=this.alt?.charAt(0)||'?'">
            <span class="avatar-fallback"></span>
          </div>
          <div class="sidebar-user">
            <span id="sidebar-username">User</span>
            <span class="status online">Online</span>
          </div>
          <button class="icon-btn" id="btn-profile" title="Profile">👤</button>
          <button class="icon-btn" id="btn-change-password" title="Change Password">🔑</button>
          <button class="icon-btn" id="btn-logout" title="Logout"><i class="ri-logout-box-r-line"></i></button>
        </header>
        <div class="sidebar-tabs">
          <button class="sidebar-tab active" data-view="chats">Chats</button>
          <button class="sidebar-tab" data-view="friends">Friends</button>
          <button class="sidebar-tab" data-view="groups">Groups</button>
        </div>
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="Search...">
        </div>
        <div class="list-container" id="chats-list">
          <!-- Chats / Friends / Groups populated by JS -->
        </div>
      </aside>
      <main class="chat-area">
        <div id="welcome-view" class="welcome-view">
          <div class="welcome-content">
            <h2>Welcome to Whispr</h2>
            <p>Select a chat or start a new conversation</p>
          </div>
        </div>
        <div id="chat-view" class="chat-view hidden">
          <header class="chat-header">
            <button class="icon-btn back-btn" id="btn-back">←</button>
            <div class="chat-header-info">
              <div class="chat-avatar">
                <img src="" alt="" onerror="this.style.display='none'">
                <span class="avatar-fallback"></span>
                <span class="status-dot" id="chat-status-dot"></span>
              </div>
              <div>
                <h3 id="chat-title">Chat</h3>
                <span id="chat-subtitle"></span>
              </div>
            </div>
            <button class="icon-btn" id="btn-chat-info" title="Info">ℹ️</button>
          </header>
          <div class="messages-container" id="messages-container">
            <div class="messages" id="messages"></div>
            <div id="typing-indicator" class="typing-indicator hidden">typing...</div>
          </div>
          <div class="message-input-area">
            <button class="icon-btn" id="btn-emoji" title="Emoji">😊</button>
            <button class="icon-btn" id="btn-gif" title="GIF">GIF</button>
            <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
            <button class="icon-btn send-btn" id="btn-send" title="Send">➤</button>
          </div>
          <div id="emoji-picker" class="emoji-picker hidden"></div>
          <div id="gif-picker" class="gif-picker hidden">
            <input type="text" id="gif-search" placeholder="Search GIFs...">
            <div id="gif-results" class="gif-results"></div>
          </div>
        </div>
      </main>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Profile</h2>
          <button class="icon-btn close-btn" id="close-profile">×</button>
        </div>
        <form id="profile-form">
          <div class="profile-avatar-edit">
            <div class="user-avatar large" id="profile-avatar">
              <img src="" alt="">
              <span class="avatar-fallback"></span>
            </div>
            <input type="file" id="profile-picture-input" accept="image/*" class="hidden">
            <button type="button" class="btn btn-secondary btn-sm" id="btn-change-avatar">Change Photo</button>
          </div>
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="profile-username" required>
          </div>
          <div class="form-group">
            <label>Bio</label>
            <textarea id="profile-bio" rows="3" maxlength="200"></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Save</button>
        </form>
      </div>
    </div>

    <!-- New Chat / Add Friend Modal -->
    <div id="new-chat-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>New Chat</h2>
          <button class="icon-btn close-btn" id="close-new-chat">×</button>
        </div>
        <input type="text" id="user-search-input" placeholder="Search users by username or email...">
        <div id="user-search-results" class="search-results"></div>
      </div>
    </div>

    <!-- New Group Modal -->
    <div id="new-group-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Create Group</h2>
          <button class="icon-btn close-btn" id="close-new-group">×</button>
        </div>
        <form id="new-group-form">
          <div class="form-group">
            <label>Group Name</label>
            <input type="text" id="group-name" required>
          </div>
          <div class="form-group">
            <label>Description (optional)</label>
            <input type="text" id="group-description">
          </div>
          <div class="form-group">
            <label>Add Members (select friends)</label>
            <div id="group-member-select" class="member-select"></div>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Create Group</button>
        </form>
      </div>
    </div>

    <!-- Group Info Modal -->
    <div id="group-info-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="group-info-title">Group Info</h2>
          <button class="icon-btn close-btn" id="close-group-info">×</button>
        </div>
        <div id="group-info-content"></div>
      </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgot-password-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Forgot Password</h2>
          <button class="icon-btn close-btn" id="close-forgot-password">×</button>
        </div>
        <form id="forgot-password-form">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="forgot-email" required placeholder="Enter your registered email">
          </div>
          <p class="auth-subtitle" style="font-size:0.85rem;">
            We will generate a reset link. In development this link is logged on the server console.
          </p>
          <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
        </form>
      </div>
    </div>

    <!-- Reset Password Modal -->
    <div id="reset-password-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Reset Password</h2>
          <button class="icon-btn close-btn" id="close-reset-password">×</button>
        </div>
        <form id="reset-password-form">
          <div class="form-group">
            <label>Reset Token</label>
            <input type="text" id="reset-token" required placeholder="Paste the reset token">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="reset-email" required placeholder="Your email">
          </div>
          <div class="form-group">
            <label>New Password</label>
            <input type="password" id="reset-new-password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
        </form>
      </div>
    </div>
    <!-- Chat Info Modal -->
<div id="chat-info-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h2>User Info</h2>
      <button class="icon-btn close-btn" id="close-chat-info">×</button>
    </div>

    <div id="chat-info-content">
      <div class="profile-avatar-edit">
        <div class="user-avatar large">
          <img id="info-avatar" src="" alt="">
          <span class="avatar-fallback"></span>
        </div>
      </div>

      <div class="form-group">
        <label>Username</label>
        <p id="info-username"></p>
      </div>

      <div class="form-group">
        <label>Email</label>
        <p id="info-email"></p>
      </div>

      <div class="form-group">
        <label>Bio</label>
        <p id="info-bio"></p>
      </div>

      <hr style="margin:1rem 0;">

      <button class="btn btn-danger btn-block" id="btn-block-user">
        Block User
      </button>

      <button class="btn btn-secondary btn-block hidden" id="btn-unblock-user">
        Unblock User
      </button>

    </div>
  </div>
</div>
  </div>

   <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
